services:

  # ── Administración Académica ──
  postgres_admin:
    image: postgres:16
    container_name: postgres_admin
    restart: unless-stopped
    environment:
      POSTGRES_DB: administracion_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d administracion_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"
    volumes:
      - postgres_admin_data:/var/lib/postgresql/data
      - ./backend/administracion/database:/docker-entrypoint-initdb.d
    networks:
      administration-network:
        aliases:
          - postgres_admin

  administration-service:
    build:
      context: ./backend/administracion
      dockerfile: Dockerfile
    container_name: administration-service
    restart: unless-stopped
    depends_on:
      postgres_admin:
        condition: service_healthy
    ports:
      - "5002:5002"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres_admin:5432/administracion_db
      PORT: "5002"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-1a6790ea7aee933b903e74fcaa2804dfbf61387d6c4d7cb61206fd32b211958b}
      JWT_ALGORITHM: HS256
    networks:
      administration-network:
        aliases:
          - administration-service

  # ── Tutorías (RabbitMQ + BD + Servicio) ──
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - tutorias-network

  postgres_tutorias:
    image: postgres:16
    container_name: postgres_tutorias
    environment:
      POSTGRES_DB: tutorias_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    volumes:
      - postgres_tutorias_data:/var/lib/postgresql/data
      - ./database/init_tutorias.sql:/docker-entrypoint-initdb.d/init_tutorias.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tutorias-network

  tutorias-service:
    build:
      context: .
      dockerfile: Dockerfile.tutorias
    container_name: tutorias-service
    command: ["python", "-u", "backend/worker.py"]
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres_tutorias:
        condition: service_healthy
    ports:
      - "5003:5003"
    environment:
      RABBITMQ_HOST: rabbitmq
      ADMINISTRACION_URL: http://administration-service:5002/api/administracion
      DATABASE_URL_TUTORIAS: postgresql://postgres:password@postgres_tutorias:5432/tutorias_db
      API_PORT: "5003"
      PYTHONUNBUFFERED: "1"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-1a6790ea7aee933b903e74fcaa2804dfbf61387d6c4d7cb61206fd32b211958b}
      JWT_ALGORITHM: HS256
    volumes:
      - .:/app
    networks:
      - tutorias-network

  # ── Ollama (motor LLM para el agente) ──
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - chatbot-network
    deploy:
      resources:
        limits:
          memory: 4G

  # ── Chatbot ──
  chatbot-db:
    image: pgvector/pgvector:pg16
    container_name: chatbot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatbotdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
    ports:
      - "5435:5432"
    volumes:
      - chatbot-db-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      chatbot-network:
        aliases:
          - chatbot-db

  chatbot-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbot-service
    restart: unless-stopped
    depends_on:
      - chatbot-db
      - ollama
    ports:
      - "5004:5004"
    environment:
      DB_HOST: chatbot-db
      DB_PORT: 5432
      DB_NAME: chatbotdb
      DB_USER: admin
      DB_PASSWORD: ${DB_PASSWORD:-admin123}
      SECURITY_SERVICE_URL: http://security-service:5001
      ADMIN_SERVICE_URL: http://administration-service:5002
      TUTORIAS_SERVICE_URL: http://tutorias-service:5003
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      RABBITMQ_QUEUE_SOLICITUDES: tutorias.solicitudes
      RABBITMQ_QUEUE_EVENTOS: tutorias.eventos
      RABBITMQ_RESPONSE_TIMEOUT: 30
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-change_me_in_production}
      AI_ENGINE: ${AI_ENGINE:-qwen}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-30}
      OLLAMA_MAX_TOOL_ITERATIONS: ${OLLAMA_MAX_TOOL_ITERATIONS:-3}
      RAG_TOP_K: ${RAG_TOP_K:-5}
      RAG_CANDIDATES: ${RAG_CANDIDATES:-20}
      RAG_MIN_SCORE: ${RAG_MIN_SCORE:-0.35}
      RAG_VECTOR_WEIGHT: ${RAG_VECTOR_WEIGHT:-0.80}
      RAG_TEXT_WEIGHT: ${RAG_TEXT_WEIGHT:-0.20}
      MODEL_NAME: all-MiniLM-L6-v2
    networks:
      chatbot-network:
        aliases:
          - chatbot-service

  chatbot-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbot-worker
    restart: unless-stopped
    command: ["python", "-m", "app.worker.summary_worker"]
    depends_on:
      - chatbot-db
      - rabbitmq
      - tutorias-service
    environment:
      DB_HOST: chatbot-db
      DB_PORT: 5432
      DB_NAME: chatbotdb
      DB_USER: admin
      DB_PASSWORD: ${DB_PASSWORD:-admin123}
      TUTORIAS_SERVICE_URL: http://tutorias-service:5003
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      RABBITMQ_QUEUE_EVENTOS: tutorias.eventos
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-change_me_in_production}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-30}
    networks:
      - chatbot-network
      - tutorias-network

  # ── API Gateway ──
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - security-service
      - administration-service
      - tutorias-service
      - chatbot-service
    networks:
      - administration-network
      - tutorias-network
      - chatbot-network
      - security-network

  # ── Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3008:3008"
    environment:
      NEXT_PUBLIC_API_GATEWAY: http://localhost:8080
    depends_on:
      - gateway
    networks:
      - administration-network
      - tutorias-network
      - chatbot-network
      - security-network

  # ── Seguridad ──
  security-db:
    image: postgres:16
    container_name: security-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: seguridaddb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d seguridaddb"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - security-db-data:/var/lib/postgresql/data
      - ./backend/security-service/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      security-network:
        aliases:
          - security-db

  security-service:
    build:
      context: ./backend/security-service
      dockerfile: Dockerfile
    container_name: security-service
    restart: unless-stopped
    depends_on:
      security-db:
        condition: service_healthy
    ports:
      - "5001:5001"
    environment:
      DB_HOST: security-db
      DB_PORT: 5432
      DB_NAME: seguridaddb
      DB_USER: admin
      DB_PASSWORD: ${DB_PASSWORD:-admin123}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-1a6790ea7aee933b903e74fcaa2804dfbf61387d6c4d7cb61206fd32b211958b}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRES: 900
      JWT_REFRESH_TOKEN_EXPIRES: 86400
      ADMIN_SERVICE_URL: http://administration-service:5002/api/administracion
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: "${SMTP_USER:-bryanlopezleon8@gmail.com}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-pmrr qtfc tntn bzea}"
      SMTP_USE_TLS: "True"
      SMTP_USE_SSL: "False"
      SMTP_FROM_EMAIL: "Sistema de Tutorias <bryanlopezleon8@gmail.com>"
      SMTP_TIMEOUT: 10
      RESET_PASSWORD_URL_BASE: http://localhost:3000/reset-password
    networks:
      security-network:
        aliases:
          - security-service

volumes:
  postgres_admin_data:
  rabbitmq_data:
  postgres_tutorias_data:
  chatbot-db-data:
  security-db-data:
  ollama_data:

networks:
  administration-network:
    external: true
    name: tutorias-mesh
  tutorias-network:
    external: true
    name: tutorias-mesh
  chatbot-network:
    external: true
    name: tutorias-mesh
  security-network:
    external: true
    name: tutorias-mesh
