upstream security { server security-service:5001; }
upstream admin    { server administration-service:5002; }
upstream tutorias { server tutorias-service:5003; }
upstream chatbot  { server chatbot-service:5004; }

server {
    listen 8080;
    server_name _;
    charset utf-8;

    client_max_body_size 10M;

    # ── Security ──
    location /security/ {
        proxy_pass http://security/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Administración Académica ──
    location /administracion/ {
        proxy_pass http://admin/api/administracion/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Tutorías ──
    location /tutorias/ {
        proxy_pass http://tutorias/api/tutorias/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Chatbot (health va a la raíz, no a /api/v1) ──
    location = /chatbot/health {
        proxy_pass http://chatbot/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /chatbot/ {
        proxy_pass http://chatbot/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

}
